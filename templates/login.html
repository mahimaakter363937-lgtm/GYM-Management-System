{% extends "base.html" %}
{% block title %}Login - Gym Management{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card">
    <h2 class="text-center">Member Login</h2>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <div class="text-center mt-3">
      <p>Don't have an account? <a href="/register">Register</a></p>
      <hr style="margin: 1.5rem 0; border-top: 1px solid var(--border-color);">
      <p>Are you an Admin? <a href="/admin/login" style="font-weight: bold; color: var(--dark-color);">Admin Portal</a></p>
      <p class="text-muted" style="font-size: 0.8rem; margin-top: 0.5rem;">
        Admin: <strong>admin</strong> / <strong>admin123</strong>
      </p>
    </div>
  </div>
</div>
{% endblock %}
