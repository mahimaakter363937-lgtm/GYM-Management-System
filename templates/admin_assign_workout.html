{% extends "base.html" %}
{% block content %}
<div class="page-wrapper" style="background-color: #f8fafc; min-height: 100vh; padding: 40px 0;">
    <div class="container">
        <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header text-center"
                style="background-color: #e9a1de; border-bottom: 1px solid #dcdde1; padding: 25px;">
                <h3 class="mb-0 font-weight-bold" style="color: #4a4a4a; letter-spacing: 1px;">Assign Workout Schedule
                </h3>
            </div>

            <div class="card-body p-5">
                <div class="mb-4 p-3" style="background: #ffffff; border-radius: 12px; border: 1px solid #eee;">
                    <div class="row align-items-center">
                        <div class="col-md-12">
                            <h5 class="mb-2" style="color: #333;">Member: <strong>{{ member.name }}</strong></h5>
                            <div class="d-flex align-items-center">
                                <span style="font-weight: 600; color: #555; margin-right: 10px;">
                                    Goal: <span style="color: #f16382;">{{ member.fitness_goal }}</span>
                                </span>
                                <span class="text-muted" style="border-left: 2px solid #ddd; padding-left: 10px;">
                                    BMI: <strong>{{ "%.1f"|format(profile.bmi) if profile else 'N/A' }}</strong>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="font-weight-bold" style="color: #555;">Select Day</label>
                            <select name="day" class="form-control custom-select"
                                style="border-radius: 10px; border: 1px solid #ddd;">
                                <option>Everyday</option>
                                <option>Monday</option>
                                <option>Tuesday</option>
                                <option>Wednesday</option>
                                <option>Thursday</option>
                                <option>Friday</option>
                                <option>Saturday</option>
                                <option>Sunday</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="font-weight-bold" style="color: #555;">Workout Type</label>
                            <select name="category" class="form-control custom-select"
                                style="border-radius: 10px; border: 1px solid #ddd;">
                                <option>Weight Loss</option>
                                <option>Muscle Gain</option>
                                <option>Cardio</option>
                                <option>Yoga & Flexibility</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group mt-3">
                        <label class="font-weight-bold" style="color: #555;">Exercise Instructions (Sets, Reps,
                            Time)</label>
                        <textarea name="workout_details" rows="6" class="form-control"
                            placeholder="Example: &#10;- Pushups: 3 sets of 15 reps &#10;- Treadmill: 20 mins &#10;- Planks: 1 min x 3"
                            style="border-radius: 12px; border: 1.5px solid #eee; padding: 15px; background-color: #fafafa;">{% if current_workout %}{{ current_workout.workout_details }}{% endif %}</textarea>
                    </div>

                    <div class="text-center mt-5">
                        <button type="submit" class="btn btn-lg text-white shadow"
                            style="background: linear-gradient(to right, rgb(255, 0, 191), #8e2de2); border-radius: 50px; padding: 12px 80px; font-weight: bold; border: none;">
                            Save
                        </button>
                        <div class="mt-3">
                            <a href="/admin/members" class="text-decoration-none text-muted font-weight-bold"
                                style="font-size: 0.9rem;">Go Back</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-select:focus,
    .form-control:focus {
        border-color: #d563f1 !important;
        box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.1);
    }

    /* Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
</style>
{% endblock %}
