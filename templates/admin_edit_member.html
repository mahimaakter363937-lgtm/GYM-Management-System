{% extends "base.html" %}
{% block title %}Edit Member - Admin{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="card">
    <h2>Edit Member Details</h2>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ member['name'] }}" required>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ member['phone'] }}">
        </div>
        <div class="form-group">
          <label class="form-label">Age</label>
          <input type="number" name="age" class="form-control" value="{{ member['age'] }}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Fitness Goal</label>
        <select name="fitness_goal" class="form-control">
          <option value="Weight Loss" {% if member['fitness_goal'] == 'Weight Loss' %}selected{% endif %}>Weight Loss</option>
          <option value="Muscle Gain" {% if member['fitness_goal'] == 'Muscle Gain' %}selected{% endif %}>Muscle Gain</option>
          <option value="Endurance" {% if member['fitness_goal'] == 'Endurance' %}selected{% endif %}>Endurance</option>
          <option value="General Fitness" {% if member['fitness_goal'] == 'General Fitness' %}selected{% endif %}>General Fitness</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">New Password (leave blank to keep current)</label>
        <input type="password" name="password" class="form-control" placeholder="********">
      </div>
      <button type="submit" class="btn btn-warning btn-full">Save Changes</button>
      <a href="/admin/members" class="btn btn-outline btn-full mt-3" style="text-align: center;">Back</a>
    </form>
  </div>
</div>
{% endblock %}
