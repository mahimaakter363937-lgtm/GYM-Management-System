{% extends "base.html" %}
{% block title %}Add New Plan - Admin{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="card">
    <h2>Add Membership Plan</h2>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Plan Name</label>
        <input type="text" name="plan_name" class="form-control" placeholder="e.g. Monthly Basic" required>
      </div>
      <div class="form-group">
        <label class="form-label">Price ($)</label>
        <input type="number" step="0.01" name="price" class="form-control" placeholder="49.99" required>
      </div>
      <div class="form-group">
        <label class="form-label">Duration (Days)</label>
        <input type="number" name="duration" class="form-control" placeholder="30" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Plan</button>
      <a href="/admin/plans" class="btn btn-outline btn-full mt-3" style="text-align: center;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
