{% extends "base.html" %}
{% block title %}Edit Plan - Admin{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="card">
    <h2>Edit Membership Plan</h2>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Plan Name</label>
        <input type="text" name="plan_name" class="form-control" value="{{ plan['plan_name'] }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Price ($)</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ plan['price'] }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Duration (Days)</label>
        <input type="number" name="duration" class="form-control" value="{{ plan['duration_days'] }}" required>
      </div>
      <button type="submit" class="btn btn-warning btn-full">Update Plan</button>
      <a href="/admin/plans" class="btn btn-outline btn-full mt-3" style="text-align: center;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
