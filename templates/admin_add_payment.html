{% extends "base.html" %}
{% block title %}Add Payment - Admin{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="card">
    <h2 class="text-center">Add New Payment Record</h2>
    <p class="text-center text-muted mb-4">Manually record a payment for a member.</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Member</label>
        <select name="member_id" class="form-control" required>
          <option value="" disabled selected>Select Member</option>
          {% for m in members %}
          <option value="{{ m.id }}">{{ m.name }} (ID: {{ m.id }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Membership Plan</label>
        <select name="plan_id" class="form-control" required>
          <option value="" disabled selected>Select Plan</option>
          {% for p in plans %}
          <option value="{{ p.id }}">{{ p.plan_name }} (${{ "%.2f"|format(p.price) }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input type="number" step="0.01" name="amount" class="form-control" placeholder="Enter amount" required>
      </div>

      <div class="form-group">
        <label class="form-label">Payment Status</label>
        <select name="payment_status" class="form-control">
          <option value="Paid">Paid</option>
          <option value="Pending">Pending</option>
          <option value="Failed">Failed</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Payment Date</label>
        <input type="date" name="payment_date" class="form-control" value="{{ today }}" required>
      </div>
      
      <div class="form-grid-2">
        <button type="submit" class="btn btn-primary">Save Payment</button>
        <a href="/admin/payments" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
